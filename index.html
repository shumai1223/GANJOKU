<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON BUMP - Local Multiplayer Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0f172a; /* Tailwind slate-900 */
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Glassmorphism for UI panels */
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Touch Zones for Mobile/Tablet */
        .touch-zone { 
            position: absolute; 
            width: 50%; 
            height: 50%; 
            pointer-events: auto; 
            display: flex; 
            padding: 24px; 
            opacity: 0.15; 
            transition: all 0.2s ease-out; 
            z-index: 10;
        }
        .touch-zone.active { 
            opacity: 0.6; 
        }
        /* Positions & Gradients for zones */
        #zone-0 { top: 0; left: 0; justify-content: flex-start; align-items: flex-start; color: #06b6d4; }
        #zone-0.active { background: radial-gradient(circle at top left, rgba(6, 182, 212, 0.3) 0%, transparent 70%); }
        
        #zone-1 { top: 0; right: 0; justify-content: flex-end; align-items: flex-start; color: #d946ef; }
        #zone-1.active { background: radial-gradient(circle at top right, rgba(217, 70, 239, 0.3) 0%, transparent 70%); }
        
        #zone-2 { bottom: 0; left: 0; justify-content: flex-start; align-items: flex-end; color: #eab308; }
        #zone-2.active { background: radial-gradient(circle at bottom left, rgba(234, 179, 8, 0.3) 0%, transparent 70%); }
        
        #zone-3 { bottom: 0; right: 0; justify-content: flex-end; align-items: flex-end; color: #22c55e; }
        #zone-3.active { background: radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.3) 0%, transparent 70%); }

        .key-hint {
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.5rem;
            border: 1px solid currentColor;
            box-shadow: 0 0 10px currentColor;
        }
    </style>
</head>
<body class="text-white">
    <!-- Game Canvas -->
    <canvas id="gameCanvas" class="absolute inset-0 w-full h-full block"></canvas>
    
    <!-- UI Layer (pointer-events-none so it doesn't block touches on canvas) -->
    <div id="ui-container" class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center z-20">
        
        <!-- Main Menu -->
        <div id="menu" class="glass p-8 md:p-10 rounded-3xl flex flex-col items-center pointer-events-auto transform transition-all duration-500" style="max-width: 440px; width: 92vw;">
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-1 italic">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500" style="filter: drop-shadow(0 0 10px rgba(6,182,212,0.5));">NEON</span>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-pink-500" style="filter: drop-shadow(0 0 10px rgba(217,70,239,0.5));">BUMP</span>
            </h1>
            <p class="text-slate-400 text-sm font-bold tracking-[0.2em] mb-4 uppercase text-center">1-Button Survival Arena</p>

            <!-- 先取設定 -->
            <div class="w-full bg-slate-800/60 rounded-xl p-3 border border-slate-700/50 mb-4">
                <p class="text-xs text-slate-400 font-bold tracking-wider mb-2 text-center">🏆 先取ポイント設定</p>
                <div class="flex gap-1.5 justify-center">
                    <button onclick="setTargetScore(1)" id="score-1" class="score-btn flex-1 py-2 rounded-lg text-sm font-bold border transition-all border-slate-600 text-slate-400">1本</button>
                    <button onclick="setTargetScore(3)" id="score-3" class="score-btn flex-1 py-2 rounded-lg text-sm font-bold border transition-all border-slate-600 text-slate-400">3本</button>
                    <button onclick="setTargetScore(5)" id="score-5" class="score-btn flex-1 py-2 rounded-lg text-sm font-bold border transition-all border-cyan-400/50 text-cyan-400 bg-cyan-400/10">5本</button>
                    <button onclick="setTargetScore(7)" id="score-7" class="score-btn flex-1 py-2 rounded-lg text-sm font-bold border transition-all border-slate-600 text-slate-400">7本</button>
                    <button onclick="setTargetScore(10)" id="score-10" class="score-btn flex-1 py-2 rounded-lg text-sm font-bold border transition-all border-slate-600 text-slate-400">10本</button>
                </div>
            </div>

            <!-- タブ切り替え -->
            <div class="w-full flex gap-2 mb-4 bg-slate-800/60 rounded-xl p-1">
                <button id="tab-multi" onclick="switchTab('multi')" class="flex-1 py-2 rounded-lg text-sm font-bold transition-all bg-white/10 text-white">👥 マルチ</button>
                <button id="tab-vs" onclick="switchTab('vs')" class="flex-1 py-2 rounded-lg text-sm font-bold transition-all text-slate-400"> vs AI</button>
            </div>

            <!-- マルチプレイパネル -->
            <div id="panel-multi" class="w-full flex flex-col gap-2.5">
                <button onclick="startGame(2, [])" class="group relative py-3.5 px-6 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 hover:border-cyan-400/50 transition-all flex justify-between items-center cursor-pointer">
                    <span class="font-bold text-xl group-hover:text-cyan-400 transition-colors">2人プレイ</span>
                    <span class="text-sm text-slate-500 group-hover:text-slate-300">Q / P</span>
                </button>
                <button onclick="startGame(3, [])" class="group relative py-3.5 px-6 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 hover:border-fuchsia-400/50 transition-all flex justify-between items-center cursor-pointer">
                    <span class="font-bold text-xl group-hover:text-fuchsia-400 transition-colors">3人プレイ</span>
                    <span class="text-sm text-slate-500 group-hover:text-slate-300">Q / P / Z</span>
                </button>
                <button onclick="startGame(4, [])" class="group relative py-3.5 px-6 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 hover:border-yellow-400/50 transition-all flex justify-between items-center cursor-pointer">
                    <span class="font-bold text-xl group-hover:text-yellow-400 transition-colors">4人プレイ</span>
                    <span class="text-sm text-slate-500 group-hover:text-slate-300">Q / P / Z / M</span>
                </button>
            </div>

            <!-- vs AIパネル -->
            <div id="panel-vs" class="w-full flex-col gap-2.5 hidden">
                <!-- 難易度選択 -->
                <div class="bg-slate-800/50 rounded-xl p-3 border border-slate-700/50">
                    <p class="text-xs text-slate-400 font-bold tracking-wider mb-2 text-center">AI 難易度</p>
                    <div class="flex gap-1">
                        <button onclick="setDifficulty('easy')" id="diff-easy" class="diff-btn flex-1 py-1.5 rounded-lg text-xs font-bold border transition-all border-green-400/50 text-green-400 bg-green-400/10">かんたん</button>
                        <button onclick="setDifficulty('normal')" id="diff-normal" class="diff-btn flex-1 py-1.5 rounded-lg text-xs font-bold border transition-all border-slate-600 text-slate-400">ふつう</button>
                        <button onclick="setDifficulty('hard')" id="diff-hard" class="diff-btn flex-1 py-1.5 rounded-lg text-xs font-bold border transition-all border-slate-600 text-slate-400">むずかしい</button>
                        <button onclick="setDifficulty('max')" id="diff-max" class="diff-btn flex-1 py-1.5 rounded-lg text-xs font-bold border transition-all border-slate-600 text-slate-400">最強</button>
                    </div>
                </div>
                <!-- モード選択 -->
                <button onclick="startGame(2, [1])" class="group py-3.5 px-6 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 hover:border-cyan-400/50 transition-all flex justify-between items-center cursor-pointer">
                    <div>
                        <span class="font-bold text-xl block group-hover:text-cyan-400 transition-colors">1 vs AI</span>
                        <span class="text-xs text-slate-500">あなた(Q) vs AI</span>
                    </div>
                    <span class="text-2xl"> </span>
                </button>
                <button onclick="startGame(3, [1,2])" class="group py-3.5 px-6 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 hover:border-fuchsia-400/50 transition-all flex justify-between items-center cursor-pointer">
                    <div>
                        <span class="font-bold text-xl block group-hover:text-fuchsia-400 transition-colors">1P vs 2 AI</span>
                        <span class="text-xs text-slate-500">あなた(Q) vs AI×2</span>
                    </div>
                    <span class="text-2xl"> </span>
                </button>
                <button onclick="startGame(4, [1,2,3])" class="group py-3.5 px-6 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 hover:border-red-400/50 transition-all flex justify-between items-center cursor-pointer">
                    <div>
                        <span class="font-bold text-xl block group-hover:text-red-400 transition-colors">1P vs 3 AI</span>
                        <span class="text-xs text-slate-500">あなた(Q) vs AI×3</span>
                    </div>
                    <span class="text-2xl">💀</span>
                </button>
                <button onclick="startGame(4, [0,1,2,3])" class="group py-3.5 px-6 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 hover:border-yellow-400/50 transition-all flex justify-between items-center cursor-pointer">
                    <div>
                        <span class="font-bold text-xl block group-hover:text-yellow-400 transition-colors">AI 同士の対戦を観る</span>
                        <span class="text-xs text-slate-500">AI×4 バトルロイヤル</span>
                    </div>
                    <span class="text-2xl">👁️</span>
                </button>
            </div>
            
            <div class="mt-4 text-center bg-slate-800/50 p-3 rounded-lg border border-slate-700 w-full">
                <p class="text-xs text-slate-300">
                    <span class="text-white font-bold">ルール：</span>
                    ボタンを<span class="text-cyan-400 font-bold">長押し</span>してダッシュ！相手を円の外に押し出せ！
                </p>
            </div>
        </div>

        <!-- Score Board -->
        <div id="score-board" class="absolute top-6 w-full flex justify-center gap-6 md:gap-12 transition-opacity duration-500 opacity-0 hidden">
            <!-- Dynamically generated -->
        </div>

        <!-- Central Message -->
        <div id="message-overlay" class="absolute inset-0 flex items-center justify-center hidden pointer-events-none">
            <h2 id="message-text" class="text-5xl md:text-8xl font-black uppercase italic tracking-widest text-center" style="transform: scale(0.5); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);"></h2>
        </div>
    </div>

    <!-- Touch Controls (Behind UI but in front of canvas) -->
    <div id="touch-controls" class="absolute inset-0 hidden z-10">
        <div id="zone-0" class="touch-zone" data-player="0"><span class="key-hint">Q</span></div>
        <div id="zone-1" class="touch-zone" data-player="1"><span class="key-hint">P</span></div>
        <div id="zone-2" class="touch-zone hidden" data-player="2"><span class="key-hint">Z</span></div>
        <div id="zone-3" class="touch-zone hidden" data-player="3"><span class="key-hint">M</span></div>
    </div>

    <script>
        // --- 設定と状態 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const PLAYER_CONFIG = [
            { color: '#06b6d4', name: 'P1 (CYAN)', key: 'q' },    // Cyan
            { color: '#d946ef', name: 'P2 (PINK)', key: 'p' },    // Pink
            { color: '#eab308', name: 'P3 (YELLOW)', key: 'z' },  // Yellow
            { color: '#22c55e', name: 'P4 (GREEN)', key: 'm' }    // Green
        ];
        
        // キーバインディングのマッピング
        const KEY_MAP = {
            'q': 0, 'Q': 0, 'ｑ': 0, 'Ｑ': 0,
            'p': 1, 'P': 1, 'ｐ': 1, 'Ｐ': 1,
            'z': 2, 'Z': 2, 'ｚ': 2, 'Ｚ': 2,
            'm': 3, 'M': 3, 'ｍ': 3, 'Ｍ': 3
        };

        let gameState = 'menu'; // menu, countdown, playing, round_end, game_over
        let playerCount = 2;
        let players = [];
        let particles = [];
        let scores = [0, 0, 0, 0];
        let targetScore = 5; // 勝利に必要なラウンド数
        let roundNumber = 0;
        let aiPlayers = []; // AI制御するプレイヤーIDのセット
        let aiDifficulty = 'hard'; // easy / normal / hard / max
        
        let arenaRadius = 0;
        let centerX = 0;
        let centerY = 0;
        let screenShake = 0;

        // タッチデバイス判定
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isTouchDevice) {
            // タッチデバイスならキー表示を隠す
            document.querySelectorAll('.key-hint').forEach(el => el.style.display = 'none');
        }

        // --- 初期化・リサイズ ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- パーティクルクラス (軽量版) ---
        // shadowBlur一切なし、型はdot/ringのみ、プール上限管理
        const MAX_PARTICLES = 80;
        class Particle {
            constructor(x, y, color, vx, vy, life = 20, type = 'dot') {
                this.x = x; this.y = y;
                this.vx = vx; this.vy = vy;
                this.life = life; this.maxLife = life;
                this.color = color; this.type = type;
                this.size = Math.random() * 3 + 1.5;
                this.maxRadius = type === 'ring' ? 55 : 0;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.90; this.vy *= 0.90;
                this.life--;
            }
            draw(ctx) {
                if (this.life <= 0) return;
                const t = this.life / this.maxLife;
                ctx.globalAlpha = t;
                if (this.type === 'ring') {
                    const r = this.maxRadius * (1 - t);
                    if (r < 1) return;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * t + 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        }

        function addParticle(p) {
            if (particles.length < MAX_PARTICLES) particles.push(p);
        }

        // 衝突エフェクト: dot×3 + ring×1 のみ
        function spawnCollisionFX(midX, midY, c1, c2, force) {
            const spd = force * 0.6 + 1;
            for (let k = 0; k < 3; k++) {
                const a = Math.random() * Math.PI * 2;
                addParticle(new Particle(midX, midY, k === 0 ? '#fff' : k === 1 ? c1 : c2,
                    Math.cos(a)*spd*(0.5+Math.random()*0.5), Math.sin(a)*spd*(0.5+Math.random()*0.5), 16, 'dot'));
            }
            addParticle(new Particle(midX, midY, '#ffffff', 0, 0, 14, 'ring'));
        }

        // 死亡エフェクト: dot×16 + ring×1
        function spawnDeathFX(x, y, color) {
            for (let i = 0; i < 16; i++) {
                const a = (i / 16) * Math.PI * 2;
                const spd = Math.random() * 8 + 2;
                addParticle(new Particle(x, y, i % 2 === 0 ? color : '#fff',
                    Math.cos(a)*spd, Math.sin(a)*spd, 40, 'dot'));
            }
            addParticle(new Particle(x, y, color, 0, 0, 22, 'ring'));
        }

        // --- ゲーム進行ロジック ---
        function switchTab(tab) {
            const isVs = tab === 'vs';
            document.getElementById('tab-multi').className = `flex-1 py-2 rounded-lg text-sm font-bold transition-all ${!isVs ? 'bg-white/10 text-white' : 'text-slate-400'}`;
            document.getElementById('tab-vs').className = `flex-1 py-2 rounded-lg text-sm font-bold transition-all ${isVs ? 'bg-white/10 text-white' : 'text-slate-400'}`;
            document.getElementById('panel-multi').classList.toggle('hidden', isVs);
            document.getElementById('panel-vs').classList.toggle('hidden', !isVs);
            if (isVs) document.getElementById('panel-vs').classList.remove('hidden');
        }

        function setTargetScore(n) {
            targetScore = n;
            document.querySelectorAll('.score-btn').forEach(btn => {
                btn.className = 'score-btn flex-1 py-2 rounded-lg text-sm font-bold border transition-all border-slate-600 text-slate-400';
            });
            const el = document.getElementById(`score-${n}`);
            if (el) el.className = 'score-btn flex-1 py-2 rounded-lg text-sm font-bold border transition-all border-cyan-400/50 text-cyan-400 bg-cyan-400/10';
        }

        function setDifficulty(diff) {
            aiDifficulty = diff;
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.className = 'diff-btn flex-1 py-1.5 rounded-lg text-xs font-bold border transition-all border-slate-600 text-slate-400';
            });
            const colors = { easy: 'green', normal: 'blue', hard: 'orange', max: 'red' };
            const c = colors[diff];
            const el = document.getElementById(`diff-${diff}`);
            el.className = `diff-btn flex-1 py-1.5 rounded-lg text-xs font-bold border transition-all border-${c}-400/50 text-${c}-400 bg-${c}-400/10`;
        }

        function startGame(num, aiIds) {
            playerCount = num;
            aiPlayers = new Set(aiIds);
            scores = [0, 0, 0, 0];
            roundNumber = 0;
            
            // UIの切り替え
            document.getElementById('menu').style.opacity = '0';
            document.getElementById('menu').style.pointerEvents = 'none';
            setTimeout(() => { document.getElementById('menu').classList.add('hidden'); }, 500);
            
            document.getElementById('score-board').classList.remove('hidden');
            setTimeout(() => { document.getElementById('score-board').style.opacity = '1'; }, 50);
            
            document.getElementById('touch-controls').classList.remove('hidden');
            for(let i=0; i<4; i++) {
                const zone = document.getElementById(`zone-${i}`);
                if(i < playerCount) zone.classList.remove('hidden');
                else zone.classList.add('hidden');
            }

            updateScoreBoard();
            startRound();
        }

        function startRound() {
            roundNumber++;
            gameState = 'countdown';
            particles = [];
            screenShake = 0;
            
            // アリーナ初期サイズ
            arenaRadius = Math.min(canvas.width, canvas.height) * 0.42;
            
            // プレイヤーの配置
            players = [];
            const spawnRadius = arenaRadius * 0.6;
            for (let i = 0; i < playerCount; i++) {
                const angle = (Math.PI * 2 / playerCount) * i - Math.PI / 2;
                players.push({
                    id: i,
                    x: centerX + Math.cos(angle) * spawnRadius,
                    y: centerY + Math.sin(angle) * spawnRadius,
                    vx: 0,
                    vy: 0,
                    radius: 18,
                    color: PLAYER_CONFIG[i].color,
                    angle: angle + Math.PI, // 中心を向く
                    isDashing: false,
                    isAlive: true
                });
                if (aiPlayers.has(i)) initAiState(i);
            }

            // カウントダウン演出
            showMessage(`ROUND ${roundNumber}`, 1500, '#ffffff');
            setTimeout(() => {
                if (gameState !== 'game_over') {
                    showMessage('GO!', 1000, '#ff0055');
                    gameState = 'playing';
                }
            }, 1800);
        }

        function showMessage(text, duration, color) {
            const overlay = document.getElementById('message-overlay');
            const msgEl = document.getElementById('message-text');
            
            msgEl.textContent = text;
            msgEl.style.color = color;
            msgEl.style.textShadow = `0 0 20px ${color}, 0 0 40px ${color}`;
            
            overlay.classList.remove('hidden');
            
            // Force reflow
            void msgEl.offsetWidth; 
            
            msgEl.style.transform = 'scale(1)';
            msgEl.style.opacity = '1';

            if (duration > 0) {
                setTimeout(() => {
                    msgEl.style.transform = 'scale(1.5)';
                    msgEl.style.opacity = '0';
                    setTimeout(() => {
                        overlay.classList.add('hidden');
                        msgEl.style.transform = 'scale(0.5)';
                    }, 400);
                }, duration);
            }
        }

        function updateScoreBoard() {
            const board = document.getElementById('score-board');
            board.innerHTML = '';
            for(let i=0; i<playerCount; i++) {
                const div = document.createElement('div');
                div.className = 'flex flex-col items-center bg-slate-800/50 px-4 py-2 rounded-xl border border-slate-700/50 backdrop-blur-sm';
                div.innerHTML = `
                    <span class="text-[10px] font-bold tracking-wider mb-1" style="color: ${PLAYER_CONFIG[i].color}">${PLAYER_CONFIG[i].name}${aiPlayers.has(i) ? ' <span style="background:rgba(255,255,255,0.15);padding:1px 5px;border-radius:4px;font-size:9px;">AI</span>' : ''}</span>
                    <div class="flex gap-1">
                        ${Array(targetScore).fill(0).map((_, idx) => 
                            `<div class="w-3 h-3 rounded-full ${idx < scores[i] ? 'bg-current shadow-[0_0_8px_currentColor]' : 'bg-slate-700'}" style="color: ${PLAYER_CONFIG[i].color}"></div>`
                        ).join('')}
                    </div>
                `;
                board.appendChild(div);
            }
        }

        function returnToMenu() {
            gameState = 'menu';
            document.getElementById('score-board').style.opacity = '0';
            setTimeout(() => { document.getElementById('score-board').classList.add('hidden'); }, 500);
            document.getElementById('touch-controls').classList.add('hidden');
            
            const menu = document.getElementById('menu');
            menu.classList.remove('hidden');
            setTimeout(() => { 
                menu.style.opacity = '1'; 
                menu.style.pointerEvents = 'auto';
            }, 50);
        }

        // --- 入力処理 ---
        function setPlayerInput(id, isPressed) {
            if (gameState !== 'playing' && gameState !== 'countdown') return;
            const player = players.find(p => p.id === id);
            if (player && player.isAlive) {
                player.isDashing = isPressed;
                
                // UI Touch Zone highlight
                const zone = document.getElementById(`zone-${id}`);
                if (isPressed) zone.classList.add('active');
                else zone.classList.remove('active');
            }
        }

        // キーボード
        window.addEventListener('keydown', (e) => {
            if (KEY_MAP[e.key] !== undefined) setPlayerInput(KEY_MAP[e.key], true);
        });
        window.addEventListener('keyup', (e) => {
            if (KEY_MAP[e.key] !== undefined) setPlayerInput(KEY_MAP[e.key], false);
        });

        // タッチ
        const zones = document.querySelectorAll('.touch-zone');
        zones.forEach(zone => {
            const id = parseInt(zone.dataset.player);
            const handleTouch = (e, isPressed) => {
                e.preventDefault();
                setPlayerInput(id, isPressed);
            };
            zone.addEventListener('touchstart', (e) => handleTouch(e, true), {passive: false});
            zone.addEventListener('touchend', (e) => handleTouch(e, false), {passive: false});
            zone.addEventListener('touchcancel', (e) => handleTouch(e, false), {passive: false});
        });

        // --- 更新ロジック ---
        function checkCollisions() {
            for (let i = 0; i < players.length; i++) {
                if (!players[i].isAlive) continue;
                for (let j = i + 1; j < players.length; j++) {
                    if (!players[j].isAlive) continue;
                    
                    const p1 = players[i];
                    const p2 = players[j];
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const distance = Math.hypot(dx, dy);
                    const minDist = p1.radius + p2.radius;

                    if (distance < minDist) {
                        // 重なりを解消
                        const angle = Math.atan2(dy, dx);
                        const overlap = minDist - distance;
                        const nx = Math.cos(angle);
                        const ny = Math.sin(angle);
                        
                        p1.x -= nx * overlap / 2;
                        p1.y -= ny * overlap / 2;
                        p2.x += nx * overlap / 2;
                        p2.y += ny * overlap / 2;

                        // 速度の反発（弾性衝突）
                        const relativeVelocityX = p1.vx - p2.vx;
                        const relativeVelocityY = p1.vy - p2.vy;
                        const speed = relativeVelocityX * nx + relativeVelocityY * ny;
                        
                        if (speed < 0) continue; // すでに離れようとしている
                        
                        // 反発係数と基礎反発力を上げてノックバックを強化
                        const restitution = 2.5; 
                        const baseImpulse = 3.7; 
                        const impulse = ((1 + restitution) * speed / 2) + baseImpulse;
                        
                        p1.vx -= impulse * nx;
                        p1.vy -= impulse * ny;
                        p2.vx += impulse * nx;
                        p2.vy += impulse * ny;

                        // エフェクト生成
                        const midX = (p1.x + p2.x) / 2;
                        const midY = (p1.y + p2.y) / 2;
                        const force = Math.abs(impulse);
                        
                        screenShake = Math.max(screenShake, force * 1.8);
                        spawnCollisionFX(midX, midY, p1.color, p2.color, force);
                    }
                }
            }
        }

        // ============================================================
        // 最強AI システム v5 — 理論値最強・全トッププレイヤーを超える
        //
        // 設計思想 (ゲームルールを完全理解した上での最適解):
        //
        // [物理モデル精密理解]
        //  - ダッシュ中: angle += 0.02, vx += cos(angle)*0.7, 摩擦 *0.94
        //  - 通常時: angle += 0.08 (高速回転)
        //  - 衝突: impulse = (1+2.5)*speed/2 + 3.7 の弾性衝突
        //  → AIはこの物理を完全に内部シミュレーションして動く
        //
        // [最強戦略の柱]
        //  1. 遠距離突進検知: プレイヤーがダッシュを開始した瞬間に検知
        //     (速度だけでなく「ダッシュ状態 + 向き」で早期警戒)
        //  2. 精密垂直回避: 脅威方向の真垂直に向いていればダッシュ回避
        //     センター側の垂直を選択し端落ちリスクを排除
        //  3. 予測射撃: 相手の回転速度・速度を考慮した未来位置に正確に狙い
        //  4. カウンター特化: 回避直後に敵が端に向いている「無防備な瞬間」を即攻撃
        //  5. 戦略的ポジション: センターより常に内側 → 攻撃が必然的に外向き
        //  6. 危機脱出: 端に向かっていたら即座に最短ルートで戻る
        //  7. 多人数戦略: 最も端に近い敵を最優先、他の衝突を「漁夫の利」に使う
        //  8. 遠距離でも突進してくる相手への早期検知 (dot閾値を下げ広角に対応)
        // ============================================================

        const AI_PARAMS = {
            easy:   { reactionDelay: 22, aimTol: 0.50, randomness: 0.60, lookahead: 4,  panicEdge: 0.93, aggrEdge: 0.68 },
            normal: { reactionDelay: 10, aimTol: 0.28, randomness: 0.28, lookahead: 16, panicEdge: 0.90, aggrEdge: 0.62 },
            hard:   { reactionDelay: 3,  aimTol: 0.13, randomness: 0.08, lookahead: 30, panicEdge: 0.87, aggrEdge: 0.56 },
            max:    { reactionDelay: 0,  aimTol: 0.032, randomness: 0.04, lookahead: 80, panicEdge: 0.78, aggrEdge: 0.40 },
        };

        const aiState = {};
        const AI_STARTUP_FRAMES = 45; // 約0.75秒 (60fps想定)

        function initAiState(id) {
            // 初期バースト長・位相をAIごとに完全独立で決める（同期防止）
            const initOn  = 1 + Math.floor(Math.random() * 10);
            const initOff = 3 + Math.floor(Math.random() * 16);
            // タイマーの初期値をランダムな中間地点から開始（位相ズレ）
            const initPhase = Math.floor(Math.random() * (initOn + initOff));
            aiState[id] = {
                delayCounter: 0, decision: false, burstTimer: 0,
                dodgeTimer: 0, dodgeDecision: false,
                wasInDodge: false, postDodgeTimer: 0,
                earlyWarnTimer: 0, prevEnemyState: {},
                repositionTimer: 0,
                startupTimer: AI_STARTUP_FRAMES,
                startupBurstLen:  initOn,
                startupBurstTimer: initPhase, // ← ここが肝：全員バラバラの位相でスタート
            };
        }

        function normalizeAngle(a) {
            while (a > Math.PI) a -= Math.PI * 2;
            while (a < -Math.PI) a += Math.PI * 2;
            return a;
        }

        /**
         * 物理エンジンの挙動を完全再現した未来位置予測
         * dashing=true の場合は回転0.02、それ以外は0.08で予測
         */
        function predictPos(p, frames, dashing = false) {
            let x = p.x, y = p.y, vx = p.vx, vy = p.vy, angle = p.angle;
            for (let f = 0; f < frames; f++) {
                angle += dashing ? 0.02 : 0.08;
                if (dashing) { vx += Math.cos(angle) * 0.7; vy += Math.sin(angle) * 0.7; }
                vx *= 0.94; vy *= 0.94;
                x += vx; y += vy;
            }
            return { x, y, vx, vy, angle };
        }

        /**
         * ダッシュしてターゲットに当てた後の双方の運命をシミュレート
         * より高精度: 衝突タイミングを精密計算
         */
        function simulateHit(ai, target, dashFrames) {
            // AIがdashFramesダッシュした後の速度を計算
            let avx = ai.vx, avy = ai.vy, aAngle = ai.angle;
            for (let f = 0; f < dashFrames; f++) {
                aAngle += 0.02;
                avx += Math.cos(aAngle) * 0.7;
                avy += Math.sin(aAngle) * 0.7;
                avx *= 0.94; avy *= 0.94;
            }
            const dx = target.x - ai.x, dy = target.y - ai.y;
            const dist = Math.hypot(dx, dy) || 1;
            const nx = dx / dist, ny = dy / dist;
            const relVx = avx - target.vx, relVy = avy - target.vy;
            const speed = relVx * nx + relVy * ny;
            const impulse = ((1 + 2.5) * Math.max(speed, 0) / 2) + 3.7;

            const a_vx = avx - impulse * nx, a_vy = avy - impulse * ny;
            const t_vx = target.vx + impulse * nx, t_vy = target.vy + impulse * ny;

            // AIの軌跡シミュレーション (90フレーム追跡)
            let ax = ai.x, ay = ai.y, avx2 = a_vx, avy2 = a_vy;
            let selfDead = false;
            for (let f = 0; f < 90; f++) {
                avx2 *= 0.94; avy2 *= 0.94;
                ax += avx2; ay += avy2;
                if (Math.hypot(ax - centerX, ay - centerY) > arenaRadius + ai.radius) { selfDead = true; break; }
            }
            const selfFinalEdge = Math.hypot(ax - centerX, ay - centerY) / arenaRadius;

            // ターゲットの軌跡シミュレーション
            let tx = target.x, ty = target.y, tvx2 = t_vx, tvy2 = t_vy;
            let targetDead = false, targetDeadFrame = 999;
            for (let f = 0; f < 90; f++) {
                tvx2 *= 0.94; tvy2 *= 0.94;
                tx += tvx2; ty += tvy2;
                if (Math.hypot(tx - centerX, ty - centerY) > arenaRadius + target.radius) { targetDead = true; targetDeadFrame = f; break; }
            }
            const targetFinalEdge = Math.hypot(tx - centerX, ty - centerY) / arenaRadius;

            return { selfDead, selfFinalEdge, targetDead, targetDeadFrame, targetFinalEdge, impulse };
        }

        /**
         * v5強化版脅威検知: 遠距離突進も含む広角・早期検知
         * 
         * 従来の問題: dot < 0.78 で 38度以内しか検知しない
         *   → 遠距離から斜めに来るプレイヤーを検知できなかった
         * 
         * v5改善: 
         *   - ダッシュ開始を速度変化で検知する「早期警戒」
         *   - 検知角度を 0.62 (51度) まで拡大
         *   - 距離に応じて衝突時間を精密計算
         *   - 相手の予測位置も使って「これから自分に向かうか」を判定
         */
        function calcIncomingThreat(ai, enemies, st) {
            let maxThreat = 0;
            let bestDodgeAngle = 0;
            let bestImpactTime = Infinity;
            const cx = centerX, cy = centerY;

            for (const enemy of enemies) {
                const enemySpeed = Math.hypot(enemy.vx, enemy.vy);
                const toAI_x = ai.x - enemy.x;
                const toAI_y = ai.y - enemy.y;
                const dist = Math.hypot(toAI_x, toAI_y);

                if (dist > arenaRadius * 1.4 || dist < ai.radius + enemy.radius + 4) continue;

                // v5: ダッシュ中 OR 速度が閾値以上で脅威候補
                // ダッシュ状態なら速度が低くても危険(加速中)
                const isDangerousBySpeed = enemySpeed > 5.0;
                const isDangerousByDash = enemy.isDashing && enemySpeed > 1.5;
                if (!isDangerousBySpeed && !isDangerousByDash) continue;

                // 方向一致度チェック (v5: 0.62まで拡大 = 約51度以内)
                const dot = enemySpeed > 0 ? (enemy.vx * toAI_x + enemy.vy * toAI_y) / (enemySpeed * dist) : 0;
                
                // ダッシュ中の敵はより広い角度で脅威判定
                const dotThreshold = enemy.isDashing ? 0.55 : 0.72;
                if (dot < dotThreshold) {
                    // v5追加: ダッシュ中で自分の方向を向いているなら速度が低くても警戒
                    // (敵の「角度」が自分に向いているか確認)
                    if (enemy.isDashing) {
                        const enemyFacingX = Math.cos(enemy.angle);
                        const enemyFacingY = Math.sin(enemy.angle);
                        const facingDot = (enemyFacingX * toAI_x + enemyFacingY * toAI_y) / (dist || 1);
                        if (facingDot < 0.60) continue; // 角度でも向いていなければスキップ
                    } else {
                        continue;
                    }
                }

                // 衝突予測時間
                const closingSpeed = Math.max(0.1, enemySpeed * Math.max(dot, 0.1));
                const impactTime = (dist - ai.radius - enemy.radius) / closingSpeed;
                if (impactTime < 0 || impactTime > 40) continue;

                // 脅威スコア = 速度 × 方向一致度 × 近さ補正
                const proximityBonus = 1 + (1 - dist / (arenaRadius * 1.4));
                const threatScore = enemySpeed * Math.max(dot, 0.5) * proximityBonus;

                if (threatScore > maxThreat) {
                    maxThreat = threatScore;
                    bestImpactTime = impactTime;

                    // 最適回避方向: 脅威の移動方向に対して垂直
                    // センターに近い方を選択
                    const threatAngle = Math.atan2(enemy.vy, enemy.vx);
                    const perp1 = threatAngle + Math.PI / 2;
                    const perp2 = threatAngle - Math.PI / 2;
                    const testX1 = ai.x + Math.cos(perp1) * 80;
                    const testY1 = ai.y + Math.sin(perp1) * 80;
                    const testX2 = ai.x + Math.cos(perp2) * 80;
                    const testY2 = ai.y + Math.sin(perp2) * 80;
                    const d1 = Math.hypot(testX1 - cx, testY1 - cy);
                    const d2 = Math.hypot(testX2 - cx, testY2 - cy);
                    bestDodgeAngle = d1 <= d2 ? perp1 : perp2;
                }
            }

            if (maxThreat > 0) {
                return { threat: maxThreat, dodgeAngle: bestDodgeAngle, impactTime: bestImpactTime };
            }
            return null;
        }

        /**
         * v5 最強AI コア
         * 
         * 優先順位:
         *  P0: パニック回避 (端に落ちそう)          → 即座に中心向きダッシュ
         *  P1: 脅威検知ドッジ (突進が来ている)       → 垂直方向に回避
         *  P2: カウンター攻撃 (ドッジ直後の無防備)   → 即反撃
         *  P3: 確定KO攻撃 (端の相手を倒せる)        → 狙い澄まして攻撃
         *  P4: 最適ポジショニング                    → 中心内側をキープ
         */
        function updateAI(ai) {
            const params = AI_PARAMS[aiDifficulty] || AI_PARAMS.hard;
            const st = aiState[ai.id] || (aiState[ai.id] = {
                delayCounter: 0, decision: false, burstTimer: 0,
                dodgeTimer: 0, dodgeDecision: false, wasInDodge: false, postDodgeTimer: 0,
                earlyWarnTimer: 0, prevEnemyState: {}, repositionTimer: 0,
            });

            // ====================================================
            // スタートアップ期間 (最初の約45f): ちょこちょこ動いてランダム攻撃
            // ====================================================
            if (st.startupTimer > 0) {
                st.startupTimer--;

                const cx_s = centerX, cy_s = centerY;
                const myDist_s = Math.hypot(ai.x - cx_s, ai.y - cy_s);
                const myEdge_s = myDist_s / arenaRadius;

                // 外向き速度を計算
                const odx_s = myDist_s > 0 ? (ai.x - cx_s) / myDist_s : 0;
                const ody_s = myDist_s > 0 ? (ai.y - cy_s) / myDist_s : 0;
                const outSpeed_s = ai.vx * odx_s + ai.vy * ody_s;

                // 15フレーム先の予測位置でエッジ判定
                const sf_s = predictPos(ai, 15, true);
                const futureEdge_s = Math.hypot(sf_s.x - cx_s, sf_s.y - cy_s) / arenaRadius;

                // 危険判定: 端に近い or 外向きに飛んでいる → 強制ダッシュOFF
                const isDangerous = futureEdge_s > 0.80
                    || (myEdge_s > 0.72 && outSpeed_s > 0.8)
                    || myEdge_s > 0.88;

                if (isDangerous) {
                    // 危険時は問答無用でOFF（回転だけして自然に向きが変わるのを待つ）
                    st.decision = false;
                    ai.isDashing = false;
                    // バーストタイマーもリセットして次の安全なタイミングで再開
                    st.startupBurstTimer = 0;
                    st.startupBurstLen = 0;
                    return;
                }

                // バーストタイマーが切れたら次のバーストをランダムに決める
                if (st.startupBurstTimer <= 0) {
                    // ON幅・OFF幅ともに独立した広い乱数で決定
                    const onLen  = 2 + Math.floor(Math.random() * 11);          // 2〜12f
                    const offLen = 4 + Math.floor(Math.random() * 18)            // 4〜21f
                                 + Math.floor(Math.random() * Math.random() * 10); // 右裾重め追加
                    st.startupBurstLen   = onLen;
                    st.startupBurstTimer = onLen + offLen;
                }
                st.startupBurstTimer--;

                // 毎フレーム小確率で強制ON/OFF切り替え（位相をランダムに壊す）
                const r = Math.random();
                if (r < 0.04) {
                    // 4%: 今のバーストを途中で打ち切り → すぐ新しい長さで再抽選
                    const onLen  = 1 + Math.floor(Math.random() * 8);
                    const offLen = 3 + Math.floor(Math.random() * 14);
                    st.startupBurstLen   = onLen;
                    st.startupBurstTimer = onLen + offLen;
                } else if (r < 0.07) {
                    // 3%: 今のフレームだけ強制OFF（ちらつき）
                    st.decision = false;
                    ai.isDashing = false;
                    return;
                }

                // バースト長の残り時間中だけダッシュ
                const isDashPhase = st.startupBurstTimer < st.startupBurstLen;
                st.decision = isDashPhase;
                ai.isDashing = isDashPhase;
                return;
            }

            // 反応遅延 (easy/normalのみ)
            st.delayCounter++;
            if (st.delayCounter < params.reactionDelay) { ai.isDashing = st.decision; return; }
            st.delayCounter = 0;

            const cx = centerX, cy = centerY;
            const myDist = Math.hypot(ai.x - cx, ai.y - cy);
            const myEdge = myDist / arenaRadius;
            const toCenterAngle = Math.atan2(cy - ai.y, cx - ai.x);

            // アウトワード速度 (端方向の速度成分)
            const odx = myDist > 0 ? (ai.x - cx) / myDist : 0;
            const ody = myDist > 0 ? (ai.y - cy) / myDist : 0;
            const outSpeed = ai.vx * odx + ai.vy * ody;

            // ====================================================
            // P0: パニック判定 (最優先)
            // ====================================================
            // 20フレーム先の予測位置でエッジ判定
            const sf20 = predictPos(ai, 20, false);
            const futureEdge20 = Math.hypot(sf20.x - cx, sf20.y - cy) / arenaRadius;
            // v5: アウトワード速度も考慮した厳しめのパニック判定
            const isPanic = futureEdge20 > params.panicEdge 
                || (myEdge > 0.88 && outSpeed > 1.2)
                || (myEdge > 0.95); // 95%以上は問答無用でパニック

            if (isPanic) {
                const diff = Math.abs(normalizeAngle(ai.angle - toCenterAngle));
                // v5: パニック時は中心方向に対してより緩い角度でもダッシュ
                st.decision = diff < (aiDifficulty === 'max' ? 0.55 : 0.45);
                ai.isDashing = st.decision;
                st.dodgeTimer = 0;
                st.postDodgeTimer = 0;
                return;
            }

            const enemies = players.filter(p => p.isAlive && p.id !== ai.id);
            if (enemies.length === 0) { st.decision = false; ai.isDashing = false; return; }

            // ====================================================
            // MAX専用ブロック: 高度ドッジシステム
            // ====================================================
            if (aiDifficulty === 'max') {

                // ドッジ完了 → 反撃ウィンドウ開始
                if (st.wasInDodge && st.dodgeTimer === 0) {
                    st.wasInDodge = false;
                    st.postDodgeTimer = 35; // 35Fの反撃ウィンドウ
                }

                // アクティブドッジ中: 方向維持
                if (st.dodgeTimer > 0) {
                    st.dodgeTimer--;
                    st.wasInDodge = true;
                    ai.isDashing = st.dodgeDecision;
                    st.decision = st.dodgeDecision;
                    return;
                }

                if (st.postDodgeTimer > 0) st.postDodgeTimer--;

                // ====================================================
                // P1: 脅威検知 → 垂直ドッジ発動 (v5: 早期広角検知)
                // ====================================================
                const incomingThreat = calcIncomingThreat(ai, enemies, st);
                if (incomingThreat) {
                    const { dodgeAngle, impactTime, threat } = incomingThreat;
                    const diff = Math.abs(normalizeAngle(ai.angle - dodgeAngle));
                    
                    // v5: 少し広い角度で回避判定 (0.40 → 0.50)
                    const dodging = diff < 0.50;
                    st.dodgeDecision = dodging;
                    // 衝突時間 + 余裕フレーム
                    const extraFrames = threat > 8 ? 12 : 8;
                    st.dodgeTimer = Math.max(6, Math.ceil(impactTime) + extraFrames);
                    st.wasInDodge = true;
                    st.decision = dodging;
                    ai.isDashing = dodging;
                    return;
                }
            }

            // ====================================================
            // ターゲット選定: スコアリング方式
            // max: outward velocity + エッジ距離 + 距離の総合スコア
            // ====================================================
            const target = enemies.reduce((best, e) => {
                const eEdge = Math.hypot(e.x - cx, e.y - cy) / arenaRadius;
                const eDist = Math.hypot(e.x - ai.x, e.y - ai.y);
                let outVel = 0;
                if (aiDifficulty === 'max') {
                    const eDstC = Math.hypot(e.x - cx, e.y - cy) || 1;
                    outVel = (e.vx * (e.x - cx) / eDstC + e.vy * (e.y - cy) / eDstC);
                }
                // エッジ近さ(最重要) + 端向き速度 + 近さ
                const s = eEdge * 3.0 + Math.max(0, outVel) * 0.40 - eDist / arenaRadius * 0.5;

                const bEdge = Math.hypot(best.x - cx, best.y - cy) / arenaRadius;
                const bDist = Math.hypot(best.x - ai.x, best.y - ai.y);
                let bOutVel = 0;
                if (aiDifficulty === 'max') {
                    const bDstC = Math.hypot(best.x - cx, best.y - cy) || 1;
                    bOutVel = (best.vx * (best.x - cx) / bDstC + best.vy * (best.y - cy) / bDstC);
                }
                const bs = bEdge * 3.0 + Math.max(0, bOutVel) * 0.40 - bDist / arenaRadius * 0.5;
                return s > bs ? e : best;
            });

            // ====================================================
            // 精密先読み射撃: 相手の回転・速度を考慮した未来位置
            // ====================================================
            // v5: targetがダッシュ中かどうかで予測モード切り替え
            const predictDashing = aiDifficulty === 'max' ? target.isDashing : false;
            const ft = predictPos(target, params.lookahead, predictDashing);
            
            // v5: 自分自身もフレーム後に移動していることを考慮した相対位置
            const selfFt = aiDifficulty === 'max' ? predictPos(ai, params.lookahead / 3, true) : ai;
            const angleToTarget = Math.atan2(ft.y - selfFt.y, ft.x - selfFt.x);
            const aimDiff = Math.abs(normalizeAngle(ai.angle - angleToTarget));
            const noise = (Math.random() < params.randomness) ? Math.random() * (aiDifficulty === 'max' ? 0.08 : 0.6) : 0;
            const effectiveAim = aimDiff + noise;

            const distToTarget = Math.hypot(target.x - ai.x, target.y - ai.y);
            const inRange = distToTarget < arenaRadius * 2.2;
            const isAimed = effectiveAim < params.aimTol;

            // 自分がターゲットより中心寄りか (有利ポジション)
            const targetFromCenter = Math.hypot(target.x - cx, target.y - cy);
            const goodPosition = aiDifficulty === 'max' ? (myDist <= targetFromCenter * 1.05) : true;

            // ====================================================
            // P2 & P3: 攻撃判定
            // ====================================================
            let shouldAttack = false;
            if (isAimed && inRange) {
                const simFrames = Math.min(params.lookahead, 35);
                const sim = simulateHit(ai, target, simFrames);
                
                if (!sim.selfDead) {
                    if (aiDifficulty === 'max') {
                        const targetEdge = targetFromCenter / arenaRadius;
                        const isCounterWindow = st.postDodgeTimer > 0;

                        if (isCounterWindow) {
                            // P2: カウンター時は自分が死なないなら即攻撃
                            shouldAttack = true;
                        } else if (goodPosition) {
                            // 有利ポジ: 少し積極的
                            shouldAttack = sim.targetFinalEdge > 0.45 || sim.targetDead || targetEdge > 0.60;
                        } else {
                            // 不利ポジ: 確実な攻撃のみ
                            shouldAttack = sim.targetFinalEdge > 0.60 || sim.targetDead || targetEdge > 0.75;
                        }
                    } else {
                        shouldAttack = sim.targetFinalEdge > 0.5 || sim.targetDead;
                    }
                } else if (sim.targetDead && sim.targetDeadFrame < 6) {
                    // 自分も死ぬが相手が先に死ぬ → 特攻OK (v5: 6フレームに短縮)
                    shouldAttack = true;
                }
            }

            // MAX: 端ギリギリの相手への即攻撃
            if (aiDifficulty === 'max' && !shouldAttack && isAimed) {
                const targetEdge = targetFromCenter / arenaRadius;
                if (targetEdge > 0.78) {
                    shouldAttack = true;
                }
            }

            // ====================================================
            // P4: ポジショニング (攻撃できないとき)
            // ====================================================
            let shouldMove = false;
            if (!shouldAttack) {
                if (myEdge > params.aggrEdge) {
                    // 端に近い → 中心方向にダッシュ
                    const cdiff = Math.abs(normalizeAngle(ai.angle - toCenterAngle));
                    shouldMove = cdiff < params.aimTol * 5.0;
                } else if (distToTarget > arenaRadius * 0.55) {
                    // 相手が遠い → 積極的に詰める (v5: 0.65 → 0.55 に短縮)
                    const adiff = Math.abs(normalizeAngle(ai.angle - angleToTarget));
                    shouldMove = adiff < params.aimTol * 4.5;
                } else {
                    // 近距離・狙えていない → バーストで速度維持
                    st.burstTimer = (st.burstTimer + 1) % 8;
                    shouldMove = st.burstTimer < 3;
                }

                // MAX専用: 有利ポジション（センター内側）への移動
                if (aiDifficulty === 'max' && !goodPosition && myEdge < 0.50) {
                    const cdiff = Math.abs(normalizeAngle(ai.angle - toCenterAngle));
                    if (cdiff < 0.30) shouldMove = true;
                }

                // v5追加: MAXが遠距離で待機しているときは積極的に近づく
                if (aiDifficulty === 'max' && distToTarget > arenaRadius * 0.80) {
                    const adiff = Math.abs(normalizeAngle(ai.angle - angleToTarget));
                    if (adiff < params.aimTol * 6.0) shouldMove = true;
                }
            }

            st.decision = shouldAttack || shouldMove;
            ai.isDashing = st.decision;
        }

        function update() {
            if (gameState === 'menu' || gameState === 'game_over') return;

            // アリーナの縮小（サドンデス）
            if (gameState === 'playing') {
                arenaRadius -= 0.05;
                if (arenaRadius < 50) arenaRadius = 50;
            }

            // プレイヤーの更新
            players.forEach(p => {
                if (!p.isAlive) return;

                // AI制御
                if (aiPlayers.has(p.id) && gameState === 'playing') {
                    updateAI(p);
                }

                if (gameState === 'playing' || gameState === 'countdown') {
                    // 回転とダッシュ
                    if (p.isDashing && gameState === 'playing') {
                        p.angle += 0.02; // ダッシュ中はゆっくり回転（狙いを定めるため）
                        p.vx += Math.cos(p.angle) * 0.7; // 加速
                        p.vy += Math.sin(p.angle) * 0.7;
                        
                        // ダッシュトレイル (50%間引き、軽量)
                        if (Math.random() > 0.55) {
                            const spd = Math.hypot(p.vx, p.vy);
                            addParticle(new Particle(
                                p.x - Math.cos(p.angle) * p.radius + (Math.random()-0.5)*4,
                                p.y - Math.sin(p.angle) * p.radius + (Math.random()-0.5)*4,
                                p.color,
                                -Math.cos(p.angle) * (0.8 + spd*0.1),
                                -Math.sin(p.angle) * (0.8 + spd*0.1),
                                10 + Math.floor(spd*0.8), 'dot'
                            ));
                        }
                    } else {
                        p.angle += 0.08; // 通常時は速く回転
                    }

                    // 摩擦
                    p.vx *= 0.94;
                    p.vy *= 0.94;

                    // 位置更新
                    p.x += p.vx;
                    p.y += p.vy;

                    // リングアウト判定
                    if (gameState === 'playing') {
                        const distFromCenter = Math.hypot(p.x - centerX, p.y - centerY);
                        if (distFromCenter > arenaRadius + p.radius) {
                            p.isAlive = false;
                            screenShake = 18;
                            spawnDeathFX(p.x, p.y, p.color);
                            // UIのハイライトを消す
                            document.getElementById(`zone-${p.id}`).classList.remove('active');
                        }
                    }
                }
            });

            if (gameState === 'playing') {
                checkCollisions();

                // 勝敗判定
                const alivePlayers = players.filter(p => p.isAlive);
                if (alivePlayers.length <= 1) {
                    gameState = 'round_end';
                    if (alivePlayers.length === 1) {
                        const winner = alivePlayers[0];
                        scores[winner.id]++;
                        updateScoreBoard();
                        
                        if (scores[winner.id] >= targetScore) {
                            // 最終勝利
                            setTimeout(() => {
                                gameState = 'game_over';
                                showMessage(`WINNER`, 0, winner.color);
                                document.getElementById('message-text').innerHTML = `<span style="color:${winner.color}">${PLAYER_CONFIG[winner.id].name}</span><br><span style="font-size:0.5em;color:#fff">CHAMPION!</span>`;
                                setTimeout(() => {
                                    document.getElementById('message-overlay').classList.add('hidden');
                                    returnToMenu();
                                }, 4000);
                            }, 1000);
                        } else {
                            // ラウンド勝利
                            showMessage(`ROUND WINNER!`, 2000, winner.color);
                            setTimeout(startRound, 2500);
                        }
                    } else {
                        // 引き分け（相打ち）
                        showMessage(`DRAW!`, 2000, '#94a3b8');
                        setTimeout(startRound, 2500);
                    }
                }
            }

            // パーティクル更新
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // 画面揺れ減衰
            if (screenShake > 0) {
                screenShake *= 0.85;
                if (screenShake < 0.5) screenShake = 0;
            }
        }

        // --- 描画ロジック ---
        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            const gridSize = 60;
            
            ctx.beginPath();
            for (let x = centerX % gridSize; x < canvas.width; x += gridSize) {
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
            }
            for (let y = centerY % gridSize; y < canvas.height; y += gridSize) {
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
        }

        function draw() {
            // 背景（残像効果のために半透明で塗りつぶす）
            ctx.fillStyle = 'rgba(15, 23, 42, 0.35)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // 画面揺れ適用
            if (screenShake > 0) {
                const dx = (Math.random() - 0.5) * screenShake;
                const dy = (Math.random() - 0.5) * screenShake;
                ctx.translate(dx, dy);
            }

            // メニュー画面以外ではアリーナを描画
            if (gameState !== 'menu' && gameState !== 'game_over') {
                drawGrid();

                // アリーナ（土俵）の描画
                ctx.beginPath();
                ctx.arc(centerX, centerY, arenaRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(15, 23, 42, 0.82)';
                ctx.fill();
                
                // 内側グロー (アリーナ床)
                const floorGradient = ctx.createRadialGradient(centerX, centerY, arenaRadius*0.3, centerX, centerY, arenaRadius);
                floorGradient.addColorStop(0, 'rgba(6, 182, 212, 0.03)');
                floorGradient.addColorStop(1, 'rgba(6, 182, 212, 0.00)');
                ctx.beginPath();
                ctx.arc(centerX, centerY, arenaRadius, 0, Math.PI * 2);
                ctx.fillStyle = floorGradient;
                ctx.fill();

                // アリーナ外周ネオンリング
                ctx.lineWidth = 3;
                ctx.strokeStyle = arenaRadius < 120 ? 'rgba(255, 50, 50, 0.9)' : 'rgba(255, 255, 255, 0.35)';
                ctx.shadowBlur = arenaRadius < 120 ? 30 : 18;
                ctx.shadowColor = arenaRadius < 120 ? 'rgba(255, 50, 50, 0.8)' : 'rgba(100, 200, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(centerX, centerY, arenaRadius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // 危険帯: 外側にグラデーション
                const dangerGradient = ctx.createRadialGradient(centerX, centerY, arenaRadius - 40, centerX, centerY, arenaRadius + 120);
                dangerGradient.addColorStop(0, 'rgba(225, 29, 72, 0.00)');
                dangerGradient.addColorStop(0.4, 'rgba(225, 29, 72, 0.08)');
                dangerGradient.addColorStop(1, 'rgba(225, 29, 72, 0.22)');
                ctx.beginPath();
                ctx.arc(centerX, centerY, arenaRadius + 120, 0, Math.PI * 2);
                ctx.arc(centerX, centerY, Math.max(0, arenaRadius - 1), 0, Math.PI * 2, true);
                ctx.fillStyle = dangerGradient;
                ctx.fill();
            }

            // パーティクル描画
            particles.forEach(p => p.draw(ctx));

            players.forEach(p => {
                if (!p.isAlive) return;
                
                const spd = Math.hypot(p.vx, p.vy);
                
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                
                // ネオン発光効果 (軽量: shadowBlurを最小限に)
                ctx.shadowBlur = p.isDashing ? 14 : 5;
                ctx.shadowColor = p.color;
                
                // 外側グロー (アウタリング)
                if (p.isDashing || spd > 4) {
                    ctx.beginPath();
                    ctx.arc(0, 0, p.radius + 5, 0, Math.PI * 2);
                    const glowAlpha = Math.min(0.35, (spd / 20) + (p.isDashing ? 0.18 : 0));
                    ctx.globalAlpha = glowAlpha;
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
                
                // 本体
                ctx.beginPath();
                ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.isDashing ? '#ffffff' : p.color;
                ctx.fill();
                
                // インナーハイライト
                if (p.isDashing) {
                    const innerGrad = ctx.createRadialGradient(-p.radius*0.3, -p.radius*0.3, 0, 0, 0, p.radius);
                    innerGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
                    innerGrad.addColorStop(1, 'rgba(255,255,255,0.0)');
                    ctx.beginPath();
                    ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = innerGrad;
                    ctx.fill();
                }
                
                // 縁取り
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = p.isDashing ? p.color : 'rgba(255,255,255,0.7)';
                ctx.stroke();
                
                // 向きを示すインジケーター（矢印）
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(p.radius + 9, 0);
                ctx.lineTo(p.radius + 1, 6);
                ctx.lineTo(p.radius + 1, -6);
                ctx.fillStyle = p.isDashing ? p.color : 'rgba(255,255,255,0.85)';
                ctx.fill();
                
                ctx.restore();
            });

            ctx.restore();
        }

        // --- メインループ ---
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        // 起動
        requestAnimationFrame(loop);

    </script>
</body>
